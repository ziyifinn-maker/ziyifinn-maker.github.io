<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        background-color: #0d1117; /* 把网页背景变成极客暗夜黑 */
        color: #58a6ff;            /* 把文字变成极具科技感的荧光蓝 */
        font-family: "Microsoft YaHei", sans-serif; /* 换成更优雅的微软雅黑字体 */
        display: flex;
        justify-content: center;   /* 让内容水平居中 */
        align-items: center;       /* 让内容垂直居中 */
        height: 100vh;             /* 让网页铺满整个屏幕 */
        margin: 0;
    }
    h1 {
        border: 2px solid #58a6ff; /* 给大标题加一个酷炫的荧光蓝边框 */
        padding: 20px 40px;        /* 让边框和文字之间留出呼吸空间 */
        border-radius: 8px;        /* 让边框的四角变得圆润 */
        box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); /* 给边框加上一层淡淡的黑客帝国科幻荧光效果 */
    }
</style>
</head>
<body>
    
<h1>这是我亲手手写的第一个 HTML 网页！</h1>



</body>
</html>
